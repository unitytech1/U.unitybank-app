<!DOCTYPE html>
<html>
<head>
<title>Enter PIN</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* CONTAINER */
.container{
    width:100%;
    max-width:420px;
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    padding:30px 25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* ICON */
.icon{
    font-size:40px;
    margin-bottom:10px;
}

/* TITLE */
.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:5px;
}

/* SUBTEXT */
.sub{
    font-size:13px;
    color:#94a3b8;
    margin-bottom:25px;
}

/* PIN INPUT */
.pin-input{
    width:100%;
    padding:18px;
    font-size:26px;
    text-align:center;
    letter-spacing:12px;
    border-radius:12px;
    border:none;
    background:#020617;
    color:white;
    margin-bottom:25px;
}

/* INPUT FOCUS */
.pin-input:focus{
    outline:none;
    box-shadow:0 0 0 2px #22c55e;
}

/* BUTTON */
.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover{
    background:#16a34a;
}

/* SMALL NOTE */
.note{
    margin-top:15px;
    font-size:11px;
    color:#64748b;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="icon">🔐</div>

        <div class="title">Enter Transfer PIN</div>
        <div class="sub">Confirm this transaction securely</div>

        <form method="POST" action="{{ url_for('confirm_pin') }}">

            <input 
                type="password" 
                name="pin" 
                maxlength="4" 
                class="pin-input" 
                placeholder="••••" 
                required
            >

            <button class="btn">Confirm</button>

        </form>

        <div class="note">
            Never share your PIN with anyone
        </div>

    </div>
</div>

</body>
</html>
