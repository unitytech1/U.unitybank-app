<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UnityBank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-4">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="flex items-center justify-center gap-3 mb-6">
                <div class="w-14 h-14 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl font-bold shadow-xl">
                    U
                </div>
                <h1 class="text-4xl font-bold text-white tracking-tighter">UnityBank</h1>
            </div>
            <p class="text-blue-200 text-lg">Secure Banking</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-10">
            
            <h2 class="text-3xl font-semibold text-gray-900 mb-2">Welcome Back</h2>
            <p class="text-gray-600 mb-8">Sign in to manage your finances securely</p>

            <!-- Flashed Messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-2xl text-sm">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email or Username</label>
                    <input type="text" name="username" 
                           class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-blue-600 focus:ring-4 focus:ring-blue-100 outline-none transition-all"
                           placeholder="Enter your email or username" required>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="password"
                               class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-blue-600 focus:ring-4 focus:ring-blue-100 outline-none transition-all"
                               placeholder="••••••••••" required>
                        <button type="button" onclick="togglePassword()" 
                                class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fa-solid fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between mb-8">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="remember" class="w-4 h-4 accent-blue-600">
                        <span class="text-sm text-gray-600">Remember me</span>
                    </label>
                    <a href="/forgot-password" class="text-blue-600 hover:text-blue-700 text-sm font-medium">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 transition-all text-white font-semibold py-4 rounded-2xl text-lg shadow-lg shadow-blue-500/30 active:scale-95">
                    Sign In
                </button>
            </form>

            <!-- Security Info -->
            <div class="flex items-center justify-center gap-8 mt-8 text-xs text-gray-500">
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-lock"></i>
                    <span>SSL Secured</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Bank-Level Security</span>
                </div>
            </div>
        </div>

        <!-- Create Account Link -->
        <p class="text-center text-gray-400 mt-8">
            Don't have an account? 
            <a href="/register" class="text-blue-400 hover:text-blue-300 font-medium">Create Free Account</a>
        </p>

    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordField.type = "password";
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
