<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UnityBank - Transfer</title>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        html, body {
            width: 100%;
            overflow-x: hidden;
            background: #0a0f1c;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100dvh;
        }
        
        .container {
            width: 100%;
            max-width: 100%;
            padding: 20px 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: #b8860b; }
        
        .card {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin: 18px 0 8px;
            font-size: 15px;
            color: #d1d5db;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: #1f2937;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .back {
            color: #9ca3af;
            text-align: center;
            margin-top: 20px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">Unity<span>Bank</span></div>
        <h2>Make a Transfer</h2>
        <p style="color:#22c55e; font-weight:600;">Available Balance: $25,000,000.00</p>
    </div>

    <div class="card">
        <label>Bank</label>
        <input type="text" placeholder="Enter bank name">

        <label>Account Number</label>
        <input type="text" placeholder="Enter account number">

        <label>Receiver Name</label>
        <input type="text" placeholder="Enter receiver name">

        <label>Address (optional)</label>
        <input type="text" placeholder="Enter address">

        <label>Amount</label>
        <input type="text" placeholder="Enter amount">
    </div>

    <button class="btn">Confirm Transfer</button>
    
    <a href="#" class="back">← Back to Dashboard</a>
</div>

</body>
</html>
