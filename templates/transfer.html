{% extends 'base.html' %}

{% block title %}Make a Transfer - UnityBank{% endblock %}

{% block content %}

    <div class="header">
        Unity<span>Bank</span>
    </div>

    <div class="container">
        <div class="card">

            <h2>Make a Transfer</h2>

            <div class="balance">
                Available Balance: 
                <b>${{ "{:,.2f}".format(user.balance) }}</b>
            </div>

            <form method="POST" action="{{ url_for('go_to_pin') }}">

                <div class="form-group">
                    <label>Bank</label>
                    <input type="text" name="bank" placeholder="Enter bank name" required>
                </div>

                <div class="form-group">
                    <label>Account Number</label>
                    <input type="text" name="account_number" placeholder="Enter account number" required>
                </div>

                <div class="form-group">
                    <label>Receiver Name</label>
                    <input type="text" name="receiver_name" placeholder="Enter receiver name" required>
                </div>

                <div class="form-group">
                    <label>Address (optional)</label>
                    <input type="text" name="address" placeholder="Enter address">
                </div>

                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" name="amount" placeholder="Enter amount" required>
                </div>

                <button type="submit" class="btn">
                    Confirm Transfer
                </button>

            </form>

            <a href="{{ url_for('dashboard') }}" class="back">
                ← Back to Dashboard
            </a>

        </div>
    </div>

{% endblock %}
