<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Unity Bank - Make a Transfer</title>
<style>
*{
    box-sizing:border-box;
    margin: 0;
    padding: 0;
}

/* =========================
   BODY - MAIN FIX HERE
========================= */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    min-height: 100dvh;           /* Important fix */
    display: flex;
    flex-direction: column;
    margin: 0;
    padding-bottom: env(safe-area-inset-bottom);
}

/* =========================
   HEADER
========================= */
.header {
    padding: 16px;
    text-align: center;
    font-size: 1.4rem;
    font-weight: bold;
}

.header span {
    color: #facc15;
}

/* =========================
   CONTAINER
========================= */
.container {
    flex: 1;                      /* This pushes content to fill screen */
    max-width: 420px;
    margin: 0 auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

/* =========================
   CARD
========================= */
.card {
    background: #111827;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    flex: 1;                      /* Allows card to expand */
    display: flex;
    flex-direction: column;
}

/* =========================
   TEXT
========================= */
h2 {
    text-align: center;
    margin-bottom: 5px;
    font-size: 20px;
}

.balance {
    text-align: center;
    color: #9ca3af;
    margin-bottom: 18px;
    font-size: 14px;
}

.balance b {
    color: #22c55e;
}

/* =========================
   FORM GROUP
========================= */
.form-group {
    margin-bottom: 14px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #d1d5db;
}

/* =========================
   INPUT
========================= */
.form-group input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #1f2937;
    color: white;
    font-size: 16px;
}

.form-group input:focus {
    outline: none;
    box-shadow: 0 0 0 2px #facc15;
}

/* =========================
   BUTTON
========================= */
.btn {
    width: 100%;
    padding: 15px;
    margin-top: auto;             /* Pushes button to bottom of card */
    background: #22c55e;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #16a34a;
}

/* =========================
   BACK LINK
========================= */
.back {
    text-align: center;
    margin-top: 18px;
    color: #9ca3af;
    text-decoration: none;
    display: block;
    font-size: 14px;
}

.back:hover {
    color: white;
}

/* =========================
   MOBILE RESPONSIVE
========================= */
@media(max-width:480px){
    .container{
        padding:12px;
    }
    .card{
        padding:18px;
    }
}
</style>
</head>
<body>

    <div class="header">
        Unity<span>Bank</span>
    </div>

    <div class="container">
        <div class="card">

            <h2>Make a Transfer</h2>

            <div class="balance">
                Available Balance: 
                <b>${{ "{:,.2f}".format(user.balance) }}</b>
            </div>

            <form method="POST" action="{{ url_for('go_to_pin') }}">

                <div class="form-group">
                    <label>Bank</label>
                    <input type="text" name="bank" placeholder="Enter bank name" required>
                </div>

                <div class="form-group">
                    <label>Account Number</label>
                    <input type="text" name="account_number" placeholder="Enter account number" required>
                </div>

                <div class="form-group">
                    <label>Receiver Name</label>
                    <input type="text" name="receiver_name" placeholder="Enter receiver name" required>
                </div>

                <div class="form-group">
                    <label>Address (optional)</label>
                    <input type="text" name="address" placeholder="Enter address">
                </div>

                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" name="amount" placeholder="Enter amount" required>
                </div>

                <button type="submit" class="btn">
                    Confirm Transfer
                </button>

            </form>

            <a href="{{ url_for('dashboard') }}" class="back">
                ← Back to Dashboard
            </a>

        </div>
    </div>

</body>
</html>
