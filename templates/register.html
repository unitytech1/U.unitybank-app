<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* CARD */
.card{
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:350px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    border:1px solid #1f2937;
}

/* LOGO */
.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.logo span{
    color:#b8860b;
}

/* TITLE */
.title{
    font-size:18px;
    margin-bottom:20px;
}

/* INPUT */
.input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #374151;
    background:#020617;
    color:white;
    outline:none;
}

.input:focus{
    border-color:#b8860b;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#b8860b;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#966d09;
}

/* LOGIN LINK */
.login{
    margin-top:15px;
    font-size:13px;
    color:#9ca3af;
}

.login a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">Unity<span>Bank</span></div>
    <div class="title">Create Your Account</div>

    <form method="POST">

        <input type="text" name="full_name" placeholder="Full Name" class="input" required>

        <input type="email" name="email" placeholder="Email Address" class="input" required>

        <input type="password" name="password" placeholder="Password" class="input" required>

        <button type="submit" class="btn">Open Account</button>

    </form>

    <div class="login">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </div>

</div>

</body>
</html>
